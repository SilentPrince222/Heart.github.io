<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #canvas.active {
            opacity: 1;
        }

        #startScreen {
            text-align: center;
            z-index: 10;
        }

        #decryptBtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff4d6d;
            padding: 18px 36px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
            border-radius: 4px;
        }

        #decryptBtn:hover {
            background: rgba(255, 77, 109, 0.1);
            border-color: rgba(255, 77, 109, 0.3);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
        }

        #decryptBtn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <button id="decryptBtn">DECRYPT MESSAGE</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const btn = document.getElementById('decryptBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 600;

        // Classic heart emoji shape (symmetric, cute heart) - parametric equation
        function heartPoint(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return {
                x: x * scale * 12,
                y: -y * scale * 12  // flip for canvas coordinates (Y down)
            };
        }

        // Generate a solid filled heart by radial scaling from center
        function getHeartPositions() {
            const positions = [];
            const scale = Math.min(canvas.width, canvas.height) / 1100;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + 50;

            for (let i = 0; i < particleCount; i++) {
                // Random angle around the heart
                const t = Math.random() * Math.PI * 2;
                const boundary = heartPoint(t, scale);

                // Radial factor: sqrt for uniform area distribution
                const r = Math.sqrt(Math.random());

                const x = boundary.x * r;
                const y = boundary.y * r;

                // Slight jitter for organic feel
                const jitter = 4;
                positions.push({
                    targetX: centerX + x + (Math.random() - 0.5) * jitter,
                    targetY: centerY + y + (Math.random() - 0.5) * jitter,
                    offsetX: 0,
                    offsetY: 0
                });
            }

            // Shuffle to avoid angular ordering patterns
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            return positions;
        }

        let heartPositions = getHeartPositions();

        class Particle {
            constructor(index) {
                this.index = index;
                this.text = 'love';
                this.fontSize = Math.random() * 8 + 6;
                this.setFont();
                this.rotation = Math.random() * Math.PI * 2; // random initial rotation
                this.rotationSpeed = (Math.random() - 0.5) * 0.02; // slow rotation drift

                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.92;
                this.springFactor = 0.08;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.05;
                this.radius = 30;
            }

            setFont() {
                ctx.font = `${this.fontSize}px Inter, sans-serif`;
            }

            update(state) {
                if (state === 'chaos') {
                    this.angle += this.angleSpeed;
                    this.x += Math.cos(this.angle) * 3;
                    this.y += Math.sin(this.angle) * 2.5;

                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                } else if (state === 'form') {
                    const target = heartPositions[this.index % heartPositions.length];
                    const dx = (target.targetX + target.offsetX) - this.x;
                    const dy = (target.targetY + target.offsetY) - this.y;
                    this.vx += dx * this.springFactor;
                    this.vy += dy * this.springFactor;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                }
                // Slowly drift rotation
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = `hsl(${330 + Math.random()*60}, 70%, 60%)`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(255, 77, 109, 0.6)';
                ctx.fillText(this.text, 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        let animationState = 'idle';
        let startTime = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => p.update(animationState));
            particles.forEach(p => p.draw());

            requestAnimationFrame(animate);
        }

        animate();

        btn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            canvas.classList.add('active');

            setTimeout(() => {
                animationState = 'chaos';
            }, 500);

            setTimeout(() => {
                animationState = 'form';
            }, 2000);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            heartPositions = getHeartPositions();
        });
    </script>
</body>
</html>
