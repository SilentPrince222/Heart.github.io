<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing Page</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --particle-color-base: 330;
            --particle-color-range: 60;
            --particle-glow: 8px rgba(255, 77, 109, 0.6);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #canvas.active {
            opacity: 1;
        }

        #startScreen {
            text-align: center;
            z-index: 10;
        }

        #decryptBtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff4d6d;
            padding: 18px 36px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
            border-radius: 4px;
        }

        #decryptBtn:hover {
            background: rgba(255, 77, 109, 0.1);
            border-color: rgba(255, 77, 109, 0.3);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
        }

        #decryptBtn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <button id="decryptBtn">DECRYPT MESSAGE</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        // Configuration
        const CONFIG = {
            particleCount: 600,
            heartScaleBase: 1100,
            heartScaleMultiplier: 12,
            chaosDuration: 500,
            formDelay: 2000,
            particleFontSizeMin: 6,
            particleFontSizeMax: 14,
            particleJitter: 4,
            heartPositionOffsetY: 50,
            chaosSpeed: 3,
            chaosYSpeed: 2.5,
            springFactor: 0.08,
            friction: 0.92,
            angleSpeedRange: 0.05,
            rotationSpeedRange: 0.02
        };

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const btn = document.getElementById('decryptBtn');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Heart shape functions
        function heartPoint(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return {
                x: x * scale * CONFIG.heartScaleMultiplier,
                y: -y * scale * CONFIG.heartScaleMultiplier // flip for canvas Y
            };
        }

        // Particle class
        class Particle {
            constructor(index) {
                this.index = index;
                this.text = 'love';
                this.fontSize = Math.random() * (CONFIG.particleFontSizeMax - CONFIG.particleFontSizeMin) + CONFIG.particleFontSizeMin;
                this.setFont();
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * CONFIG.rotationSpeedRange;

                this.resetPosition();
            }

            setFont() {
                ctx.font = `${this.fontSize}px Inter, sans-serif`;
            }

            resetPosition() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * CONFIG.angleSpeedRange;
            }

            update(state, heartPositions) {
                if (state === 'chaos') {
                    this.angle += this.angleSpeed;
                    this.x += Math.cos(this.angle) * CONFIG.chaosSpeed;
                    this.y += Math.sin(this.angle) * CONFIG.chaosYSpeed;

                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                } else if (state === 'form') {
                    const target = heartPositions[this.index % heartPositions.length];
                    const dx = (target.targetX + target.offsetX) - this.x;
                    const dy = (target.targetY + target.offsetY) - this.y;
                    this.vx += dx * CONFIG.springFactor;
                    this.vy += dy * CONFIG.springFactor;
                    this.vx *= CONFIG.friction;
                    this.vy *= CONFIG.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                }
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = `hsl(${CONFIG.particleColorBase + Math.random()*CONFIG.particleColorRange}, 70%, 60%)`;
                ctx.shadowBlur = CONFIG.particleGlow.split('px')[0];
                ctx.shadowColor = CONFIG.particleGlow.split(' ')[1] + ' ' + CONFIG.particleGlow.split(' ')[2] + ' ' + CONFIG.particleGlow.split(' ')[3];
                ctx.fillText(this.text, 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        // Initialize particles
        let particles = [];
        let heartPositions = [];
        let animationState = 'idle';

        function initParticles() {
            particles = [];
            heartPositions = generateHeartPositions();
            for (let i = 0; i < CONFIG.particleCount; i++) {
                particles.push(new Particle(i));
            }
        }

        function generateHeartPositions() {
            const positions = [];
            const scale = Math.min(canvas.width, canvas.height) / CONFIG.heartScaleBase;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + CONFIG.heartPositionOffsetY;

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const boundary = heartPoint(t, scale);
                const r = Math.sqrt(Math.random()); // uniform area distribution
                const x = boundary.x * r;
                const y = boundary.y * r;
                const jitter = CONFIG.particleJitter;
                positions.push({
                    targetX: centerX + x + (Math.random() - 0.5) * jitter,
                    targetY: centerY + y + (Math.random() - 0.5) * jitter,
                    offsetX: 0,
                    offsetY: 0
                });
            }

            // Shuffle to avoid angular ordering
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            return positions;
        }

        // Animation loop
        let startTime = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => p.update(animationState, heartPositions));
            particles.forEach(p => p.draw());

            requestAnimationFrame(animate);
        }

        // Event handling
        btn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            canvas.classList.add('active');
            initParticles();

            setTimeout(() => {
                animationState = 'chaos';
            }, CONFIG.chaosDuration);

            setTimeout(() => {
                animationState = 'form';
            }, CONFIG.chaosDuration + CONFIG.formDelay);
        });

        // Start animation loop
        animate();
    </script>
</body>
</html>
